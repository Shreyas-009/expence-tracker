<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackPro</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main id="unauthorized">

        <button class="login-theme-btn theme-btn" id="theme-btn" onclick="toggleTheme()">
            <img class="svg-icon theme-icon" src="./icons/sun.svg" alt="" aria-hidden="true">
        </button>

        <form id="form">
            <h1 id="form-title">Login</h1>
            <hr>
            <input type="text" value="" name="username" placeholder="Enter username">
            <input type="text" value="" name="password" placeholder="Enter password">
            <button id="form-btn">Login</button>
            <p id="login-disc">Don't have an account ? <span onclick="authChange(this)">Register</span></p>
            <p id="register-disc">Have an account! <span onclick="authChange(this)">Login</span></p>
        </form>
    </main>
    <main id="authorized">
        <!-- sidebar -->
        <aside id="sidebar">
            <div id="nav-head">
                <h1>TrackPro</h1>
            </div>
            <div id="nav-body">
                <div id="links">
                    <button class="nav-btns active-btn" onclick="changePage(this,'dashboard')">Dashboard</button>
                    <button class="nav-btns" onclick="changePage(this,'profile')">Settings</button>
                </div>
                <button id="addBtn" onclick="toggleModal()">Add Transaction</button>
            </div>

        </aside>
        <button id="sidebar-overlay" type="button" aria-label="Close side menu"></button>

        <!-- main content section -->
        <section>

            <!-- top header -->
            <header>
                <div id="header-left">
                    <button id="menu-toggle" type="button" aria-label="Toggle side menu" aria-controls="sidebar"
                        aria-expanded="false">
                        <img class="svg-icon icon-menu" src="./icons/menu.svg" alt="">
                    </button>
                    <h1 id="header-title">Dashboard</h1>
                </div>
                <div id="header-right">
                    <button id="reset-btn" type="button" aria-label="Reset transactions" onclick="reset()">
                        <img class="svg-icon icon-reset" src="./icons/reset.svg" alt="" aria-hidden="true">
                    </button>
                    <button id="theme-btn" class="theme-btn" onclick="toggleTheme()">
                        <img class="svg-icon theme-icon" src="./icons/sun.svg" alt="">
                    </button>
                    <h3 id="user-name">User</h3>
                    <button id="logout-btn" type="button" aria-label="Logout"><img class="svg-icon icon-logout" src="./icons/logout.svg" alt=""
                        ><span>Logout</span></button>
                </div>
            </header>

            <!-- dashboard page -->
            <div class="pages" id="dashboard">

                <!-- expence show -->
                <div id="topCards">
                    <div class="card">
                        <div class="card-icon"><img class="card-svg" src="./icons/balance.svg" alt=""
                                aria-hidden="true"></div>
                        <p>Current Balance</p>
                        <h3><span class="currency-symbol">₹</span><span id="current-balance">0.00</span></h3>
                    </div>
                    <div class="card">
                        <div class="card-icon"><img class="card-svg" src="./icons/income.svg" alt="" aria-hidden="true">
                        </div>
                        <p>Total Income</p>
                        <h3><span class="currency-symbol">₹</span><span id="total-income">0.00</span></h3>
                    </div>
                    <div class="card">
                        <div class="card-icon"><img class="card-svg" src="./icons/expense.svg" alt=""
                                aria-hidden="true"></div>
                        <p>Total Expense</p>
                        <h3><span class="currency-symbol">₹</span><span id="total-expense">0.00</span></h3>
                    </div>
                    <div class="card">
                        <div class="card-icon"><img class="card-svg" src="./icons/transaction.svg" alt=""
                                aria-hidden="true"></div>
                        <p>Total Transaction</p>
                        <h3><span id="transaction-count">0</span></h3>
                    </div>
                </div>

                <!-- expence table  -->
                <div id="expence-table">
                    <div id="table-head">
                        <h1>All Transactions</h1>
                        <button id="addBtn" onclick="toggleModal()">Add Transaction</button>

                    </div>
                    <div id="table-top">
                        <div id="search-bar">
                            <img class="svg-icon icon-search search-icon" src="./icons/search.svg" alt=""
                                aria-hidden="true">
                            <input type="text" id="search-input" placeholder="Search transactions...">
                        </div>
                        <select name="transaction-type" id="transaction-filter">
                            <option value="all">All Transactions</option>
                            <option value="expense">Expense Only</option>
                            <option value="income">Income Only</option>
                        </select>
                    </div>

                    <div id="table-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                            </tbody>
                        </table>
                    </div>
                </div>


                <!-- chart  -->
                <div id="chart-box">
                    <h1>Overview</h1>
                    <canvas id="myChart"></canvas>
                </div>
            </div>

            <!-- Settings page -->
            <div class="pages" id="profile">
                <div class="profile-box">
                    <h2>Profile</h2>
                    <div class="field-group">
                        <label for="profile-username">Username</label>
                        <input type="text" id="profile-username" placeholder="Enter username">
                    </div>
                    <div class="field-group">
                        <label for="currency-inp">Currency</label>
                        <select id="currency-inp">
                            <option value="$">$ USD</option>
                            <option value="₹">₹ INR</option>
                            <option value="€">€ EUR</option>
                            <option value="£">£ GBP</option>
                        </select>
                    </div>
                    <button id="profile-save-btn" onclick="saveProfile()">Save</button>
                </div>
            </div>



        </section>
        <div class="Modal hide">
            <div id="form">
                <div class="form-header">
                    <h1 id="Modal-title">Add Transaction</h1>
                    <button type="button" class="close-btn" onclick="closeModal()" aria-label="Close modal">
                        <img class="svg-icon icon-close" src="./icons/close.svg" alt="" aria-hidden="true">
                    </button>
                </div>
                <div class="field-group">
                    <label for="type-inp">Type</label>
                    <select id="type-inp" required>
                        <option value="Expense">Expense</option>
                        <option value="Income">Income</option>
                    </select>
                </div>
                <div class="field-group">
                    <label for="description-inp">Description</label>
                    <input type="text" value="" name="description" placeholder="e.g. Amazon, Salary, Coffee"
                        id="description-inp" required />
                </div>
                <div class="field-row">
                    <div class="field-group">
                        <label for="amount-inp">Amount</label>
                        <input type="number" value="" name="amount" placeholder="0.00" id="amount-inp" required />
                    </div>
                    <div class="field-group">
                        <label for="date-inp">Date</label>
                        <input type="date" value="" name="date" id="date-inp" required />
                    </div>
                </div>
                <div class="field-group">
                    <label for="category-inp">Category</label>
                    <select id="category-inp" required>
                        <option value="">Select a category</option>
                        <option value="Food & Dining">Food & Dining</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Recharge & Bills">Recharge & Bills</option>
                        <option value="Petrol & Auto">Petrol & Auto</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Salary">Salary</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button id="Modal-btn" onclick="addTask()">Add Transaction</button>
            </div>
        </div>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="./script.js"></script>

</html>
