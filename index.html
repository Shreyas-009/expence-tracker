<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenceManager</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main>
        <!-- sidebar -->
        <aside>
            <div id="nav-head">
                <h1>Expence Manager</h1>
            </div>
            <div id="nav-body">
                <h3>Liks : </h3>
                <div id="links">
                    <button onclick="changePage('dashboard')">Dashboard</button>
                    <button onclick="changePage('profile')">Profile</button>
                </div>
            </div>
        </aside>

        <!-- main content section -->
        <section>

            <!-- top header -->
            <header>
                <h1 id="header-title">Dashboard</h1>
                <div id="header-right">
                    <button>☀️</button>
                    <h3 id="user-name">User</h3>
                    <button id="logout-btn">Logout <span> > </span></button>
                </div>
            </header>

            <!-- dashboard page -->
            <div class="pages" id="dashboard">

                <!-- expence show -->
                <div id="topCards">
                    <div class="card">
                        <div class="card-icon">H</div>
                        <p>Current Balance</p>
                        <h3>-$ <span id="current-balance">123.00</span></h3>
                    </div>
                    <div class="card">
                        <div class="card-icon">H</div>
                        <p>Current Balance</p>
                        <h3>-$ <span id="current-balance">123.00</span></h3>
                    </div>
                    <div class="card">
                        <div class="card-icon">H</div>
                        <p>Current Balance</p>
                        <h3>-$ <span id="current-balance">123.00</span></h3>
                    </div>
                    <div class="card">
                        <div class="card-icon">H</div>
                        <p>Current Balance</p>
                        <h3>-$ <span id="current-balance">123.00</span></h3>
                    </div>
                </div>

                <!-- expence table  -->
                <div id="expence-table">

                </div>
            </div>

            <!-- Settings page -->
            <div class="pages" id="profile">
                Profile
            </div>


        </section>
    </main>
</body>
<script src="./script.js"></script>

</html>
